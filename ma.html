<!DOCTYPE html>
<html>
   <head>
      <title>Report</title>
      <meta charset="UTF-8">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" rel="stylesheet">
   </head>
   <body>
      <div id="mapHTMLReportGenerator1" style="width:100%;height:500px;"></div>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.4/leaflet.css" />
      <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.4/leaflet.js"></script>
               <script src="https://unpkg.com/esri-leaflet@2.2.3/dist/esri-leaflet.js"></script>

      <script>
         var map = L.map('mapHTMLReportGenerator1').setView([0, 0], 3);
                     L.esri.basemapLayer("Terrain").addTo(map);

         map.createPane("labels");
         var layer = L.geoJson(
            [
  {
    "type":"Feature",
    "properties":{
      "name":"Riyadh",
      "popupContent":"Riyadh"
    },
    "geometry":{
      "type":"Polygon",
      "coordinates":[
        [
          [
            46.793744151992115,
            24.837906551116973
          ],
          [
            46.605275031914516,
            24.767385583462143
          ],
          [
            46.563820659770414,
            24.692797177889773
          ],
          [
            46.64392683660273,
            24.5606999143575
          ],
          [
            46.85820152032113,
            24.65420952544588
          ],
          [
            46.879567404011965,
            24.725632115668276
          ],
          [
            46.793744151992115,
            24.837906551116973
          ]
        ]
      ]
    }
  }
],
            {
                onEachFeature: function (feature, layer) {
                    layer.bindPopup(feature.properties.popupContent);
                },
                style:{"color": "rgb(0,0,255)"},
                pane: "labels"
            }).addTo(map);
         map.fitBounds(layer.getBounds());
      </script>
   </body>
</html>
